AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "COGNIVAULT v2 \u2014 Cognitive Debt Map Backend Production-grade serverless\
  \ API with multi-model AI analysis, DynamoDB single-table design, cost guardrails,\
  \ and observability.\n"
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - prod
    Description: Deployment environment
  PrimaryModelId:
    Type: String
    Default: meta.llama4-maverick-17b-instruct-v1:0
    Description: Primary Bedrock model ID
  FallbackModelId:
    Type: String
    Default: meta.llama3-1-8b-instruct-v1:0
    Description: Fallback Bedrock model ID
  DailyBudgetUsd:
    Type: Number
    Default: 50
    Description: Daily Bedrock spending limit in USD
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
    - DEBUG
    - INFO
    - WARNING
    - ERROR
  RequireAuth:
    Type: String
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
    Description: Require Cognito JWT authentication
  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Cognito User Pool ID (leave empty to skip auth)
  CognitoAppClientId:
    Type: String
    Default: ''
    Description: Cognito App Client ID
  AllowedOrigins:
    Type: String
    Default: '*'
    Description: CORS allowed origins (restrict in prod)
Conditions:
  IsProd:
    Fn::Equals:
    - Ref: Environment
    - prod
  IsNotDev:
    Fn::Not:
    - Fn::Equals:
      - Ref: Environment
      - dev
Globals:
  Function:
    Runtime: python3.11
    MemorySize: 512
    Timeout: 60
    Architectures:
    - arm64
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT:
          Ref: Environment
        TABLE_NAME:
          Ref: CognivaultTable
        PRIMARY_MODEL_ID:
          Ref: PrimaryModelId
        FALLBACK_MODEL_ID:
          Ref: FallbackModelId
        BEDROCK_REGION:
          Ref: AWS::Region
        LOG_LEVEL:
          Ref: LogLevel
        DAILY_BUDGET_USD:
          Ref: DailyBudgetUsd
        REQUIRE_AUTH:
          Ref: RequireAuth
        COGNITO_USER_POOL_ID:
          Ref: CognitoUserPoolId
        COGNITO_APP_CLIENT_ID:
          Ref: CognitoAppClientId
        ALLOWED_ORIGINS:
          Ref: AllowedOrigins
        ENABLE_COST_TRACKING: 'true'
        ENABLE_RATE_LIMITING: 'true'
        ENABLE_FALLBACK_MODEL: 'true'
        ENABLE_RULE_BASED_FALLBACK: 'true'
  Api:
    Cors:
      AllowOrigin:
        Fn::Sub: '''${AllowedOrigins}'''
      AllowHeaders: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Correlation-Id'''
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
Resources:
  CognivaultApi:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: cognivault-api-${Environment}
      StageName:
        Ref: Environment
      TracingEnabled: true
      MethodSettings:
      - ResourcePath: /*
        HttpMethod: '*'
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
        MetricsEnabled: false
        DataTraceEnabled: false
        LoggingLevel: 'OFF'
  CognivaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: cognivault-backend-${Environment}
      Handler: entrypoint.lambda_handler
      CodeUri: CognivaultFunction
      Description: "Cognivault v2 \u2014 Cognitive Debt Map analysis engine"
      AutoPublishAlias: live
      DeploymentPreference:
        Type:
          Fn::If:
          - IsProd
          - Canary10Percent5Minutes
          - AllAtOnce
        Alarms:
        - Ref: CognivaultErrorAlarm
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CognivaultTable
      - Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource:
          - Fn::Sub: arn:aws:bedrock:${AWS::Region}::foundation-model/${PrimaryModelId}
          - Fn::Sub: arn:aws:bedrock:${AWS::Region}::foundation-model/${FallbackModelId}
          - Fn::Sub: arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*
      - CloudWatchPutMetricPolicy: {}
      - Statement:
        - Effect: Allow
          Action:
          - xray:PutTraceSegments
          - xray:PutTelemetryRecords
          Resource: '*'
      Events:
        AnalyzeV1:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /v1/analyze
            Method: POST
        EvidenceV1:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /v1/evidence
            Method: POST
        MentalModelV1:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /v1/mental-model/{userId}
            Method: GET
        InterventionsV1:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /v1/interventions/{conceptId}
            Method: GET
        UnderstoodV1:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /v1/mental-model/{userId}/concepts/{conceptId}/understood
            Method: PUT
        AnalyzeLegacy:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /analyze
            Method: POST
        EvidenceLegacy:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /evidence
            Method: POST
        MentalModelLegacy:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /mental-model/{userId}
            Method: GET
        InterventionsLegacy:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /interventions/{conceptId}
            Method: GET
        UnderstoodLegacy:
          Type: Api
          Properties:
            RestApiId:
              Ref: CognivaultApi
            Path: /mental-model/{userId}/concepts/{conceptId}/understood
            Method: PUT
    Metadata:
      SamResourceId: CognivaultFunction
  CognivaultTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: cognivault-data-${Environment}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled:
          Fn::If:
          - IsProd
          - true
          - false
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: GSI1PK
        AttributeType: S
      - AttributeName: GSI1SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: GSI1
        KeySchema:
        - AttributeName: GSI1PK
          KeyType: HASH
        - AttributeName: GSI1SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
  CognivaultLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/cognivault-backend-${Environment}
      RetentionInDays:
        Fn::If:
        - IsProd
        - 90
        - 14
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/apigateway/cognivault-api-${Environment}
      RetentionInDays:
        Fn::If:
        - IsProd
        - 90
        - 7
  CognivaultErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: cognivault-errors-${Environment}
      AlarmDescription: Triggered when Lambda error rate exceeds threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: CognivaultFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold:
        Fn::If:
        - IsProd
        - 5
        - 20
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
  CognivaultLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: cognivault-latency-${Environment}
      AlarmDescription: Triggered when p99 latency exceeds 10 seconds
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: CognivaultFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
  CognivaultThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: cognivault-throttles-${Environment}
      AlarmDescription: Triggered when Lambda is being throttled
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: CognivaultFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
  CognivaultDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: cognivault-dlq-${Environment}
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 300
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${CognivaultApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  ApiUrlV1:
    Description: API v1 base URL
    Value:
      Fn::Sub: https://${CognivaultApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/v1
  FunctionArn:
    Description: Lambda function ARN
    Value:
      Fn::GetAtt:
      - CognivaultFunction
      - Arn
  TableName:
    Description: DynamoDB table name
    Value:
      Ref: CognivaultTable
  DLQUrl:
    Description: Dead Letter Queue URL
    Value:
      Ref: CognivaultDLQ
